name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      browser: ${{ steps.filter.outputs.browser }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'tsup.config.ts'
              - 'vitest.config.ts'
              - 'apps/**'
              - 'packages/**'
              - 'scripts/**'
              - 'test/**/*.ts'
            browser:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'playwright.config.ts'
              - 'apps/learn/**'
              - 'scripts/declared-port.mjs'
              - 'scripts/proof-report.mjs'
              - 'test/e2e/**'
            rust:
              - '.github/workflows/ci.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Anchor.toml'
              - 'rust-toolchain*'
              - 'crates/**'
              - 'programs/**'

  typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.14.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
      - if: matrix.node == 24
        run: pnpm release:smoke

  browser-proof:
    needs: changes
    if: needs.changes.outputs.browser == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.14.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: echo "TXLINE_TEST_WEB_PORT=$(node scripts/declared-port.mjs txline-kit-test-web)" >> "$GITHUB_ENV"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm proof:report -- 0
      - run: pnpm test:e2e

  rust-cpi:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo check -p txline-kit-cpi --no-default-features --features devnet --locked
      - run: rustup toolchain install 1.85.0 --profile minimal
      - run: cargo +1.85.0 check --workspace --locked
      - run: cargo package -p txline-kit-cpi --locked
